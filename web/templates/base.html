<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Albus Barks</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <a href="/" class="brand">
                <span class="brand-icon">🐶</span>
                <span>
                    <strong>Albus Barks</strong>
                    <small>Tamagotchi-style task companion</small>
                </span>
            </a>
            <nav>
                <a href="/">Tasks</a>
                <a href="/tasks/new" class="button button-primary">+ New Task</a>
            </nav>
        </header>
        <main>{% block content %}{% endblock %}</main>
    </div>
</body>
</html>
